<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI — Your Smart Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===================== RESET & TOKENS ===================== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-base: #07070d;
            --bg-chat: #0c0c16;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --accent: #7c6cf0;
            --accent-light: #a89afe;
            --accent-glow: rgba(124, 108, 240, 0.25);
            --sent-bg: linear-gradient(135deg, #7c6cf0, #a89afe);
            --recv-bg: rgba(255, 255, 255, 0.05);
            --text: #eeeef4;
            --text-dim: #7e7e9a;
            --text-faint: #4a4a60;
            --border: rgba(255, 255, 255, 0.06);
            --danger: #ff6b6b;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        /* ===================== BODY ===================== */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-base);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated gradient backdrop */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 700px 500px at 25% 20%, rgba(124, 108, 240, 0.10), transparent),
                radial-gradient(ellipse 600px 400px at 75% 80%, rgba(168, 154, 254, 0.07), transparent);
            animation: drift 10s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes drift {
            0% {
                opacity: .5;
                transform: scale(1) translateY(0);
            }

            100% {
                opacity: 1;
                transform: scale(1.08) translateY(-10px);
            }
        }

        /* ===================== APP SHELL ===================== */
        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 760px;
            height: 96vh;
            display: flex;
            flex-direction: column;
            border-radius: var(--radius-lg);
            background: var(--bg-chat);
            border: 1px solid var(--border);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, .55),
                0 0 50px var(--accent-glow);
            overflow: hidden;
        }

        /* ===================== HEADER ===================== */
        .header {
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(12, 12, 22, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .header-logo {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: var(--sent-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 18px var(--accent-glow);
            flex-shrink: 0;
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {

            0%,
            100% {
                box-shadow: 0 4px 18px var(--accent-glow);
            }

            50% {
                box-shadow: 0 4px 30px rgba(124, 108, 240, 0.45);
            }
        }

        .header-info {
            flex: 1;
        }

        .header-info h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-info .tagline {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .hdr-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: var(--bg-card);
            color: var(--text-dim);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .25s ease;
        }

        .hdr-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text);
            transform: translateY(-1px);
        }

        /* ===================== CHAT MESSAGES ===================== */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar {
            width: 5px;
        }

        #chat-box::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 10px;
        }

        /* Welcome card */
        .welcome-card {
            text-align: center;
            padding: 40px 20px 30px;
            animation: fadeUp .6s ease;
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: var(--sent-bg);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 6px 25px var(--accent-glow);
        }

        .welcome-card h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-card p {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto 20px;
        }

        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .quick-prompt {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-dim);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all .25s ease;
        }

        .quick-prompt:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: rgba(124, 108, 240, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* Message Bubbles */
        .msg {
            display: flex;
            gap: 10px;
            max-width: 82%;
            animation: msgSlide .35s cubic-bezier(.34, 1.56, .64, 1);
        }

        @keyframes msgSlide {
            0% {
                opacity: 0;
                transform: translateY(14px) scale(.96);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg.ai {
            align-self: flex-start;
        }

        .msg-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg.user .msg-icon {
            background: var(--sent-bg);
            box-shadow: 0 2px 10px var(--accent-glow);
        }

        .msg.ai .msg-icon {
            background: var(--recv-bg);
            border: 1px solid var(--border);
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
            word-break: break-word;
        }

        .msg.user .bubble {
            background: var(--sent-bg);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 18px var(--accent-glow);
        }

        .msg.ai .bubble {
            background: var(--recv-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .bubble .timestamp {
            display: block;
            font-size: 10px;
            opacity: .5;
            text-align: right;
            margin-top: 6px;
        }

        /* AI Typing Indicator */
        .typing-row {
            display: flex;
            gap: 10px;
            align-self: flex-start;
            animation: msgSlide .3s ease;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 14px 18px;
            background: var(--recv-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-faint);
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: .2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: .35;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* Error messages */
        .msg-error .bubble {
            background: rgba(255, 107, 107, .1) !important;
            border: 1px solid rgba(255, 107, 107, .25) !important;
            color: var(--danger) !important;
        }

        /* ===================== INPUT AREA ===================== */
        .input-area {
            padding: 14px 20px 18px;
            border-top: 1px solid var(--border);
            background: rgba(12, 12, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 5px 6px 5px 16px;
            transition: all .3s ease;
        }

        .input-row:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: var(--bg-card-hover);
        }

        #user-input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 36px;
            max-height: 120px;
            line-height: 1.5;
            padding: 6px 0;
        }

        #user-input::placeholder {
            color: var(--text-faint);
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            border: none;
            background: var(--sent-bg);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .25s ease;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 22px var(--accent-glow);
        }

        .send-btn:active {
            transform: scale(.94);
        }

        .send-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none !important;
        }

        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-faint);
            margin-top: 8px;
        }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 600px) {
            .app {
                height: 100vh;
                border-radius: 0;
                max-width: 100%;
            }

            .header {
                padding: 14px 16px;
            }

            #chat-box {
                padding: 16px 12px;
            }

            .msg {
                max-width: 90%;
            }

            .input-area {
                padding: 10px 12px 14px;
            }
        }

        /* ===================== TEXT SELECTION ===================== */
        ::selection {
            background: var(--accent);
            color: #fff;
        }

        /* ===================== CODE BLOCKS IN AI RESPONSE ===================== */
        .bubble code {
            background: rgba(255, 255, 255, .08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
        }

        .bubble pre {
            background: rgba(0, 0, 0, .35);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            margin: 8px 0;
            overflow-x: auto;
            font-size: 13px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            line-height: 1.5;
        }

        .bubble pre code {
            background: none;
            padding: 0;
        }
    </style>
</head>

<body>

    <div class="app">
        <!-- ======= HEADER ======= -->
        <div class="header">
            <div class="header-logo">🧠</div>
            <div class="header-info">
                <h1>NexusAI</h1>
                <div class="tagline">Your intelligent assistant — powered by AI</div>
            </div>
            <div class="header-actions">
                <button class="hdr-btn" title="New Chat" onclick="clearChat()">🗑️</button>
                <button class="hdr-btn" title="Settings">⚙️</button>
            </div>
        </div>

        <!-- ======= CHAT BOX ======= -->
        <div id="chat-box">
            <div class="welcome-card" id="welcome">
                <div class="welcome-icon">✨</div>
                <h2>Hey there! I'm NexusAI</h2>
                <p>Ask me anything — from coding questions to creative writing. I'm here to help!</p>
                <div class="quick-prompts">
                    <button class="quick-prompt" onclick="quickSend('Explain quantum computing simply')">🔬 Quantum
                        Computing</button>
                    <button class="quick-prompt" onclick="quickSend('Write a short poem about the stars')">🌟 Write a
                        Poem</button>
                    <button class="quick-prompt" onclick="quickSend('Give me 5 productivity tips')">💡 Productivity
                        Tips</button>
                    <button class="quick-prompt" onclick="quickSend('Help me debug my JavaScript code')">🐛 Debug
                        Code</button>
                </div>
            </div>
        </div>

        <!-- ======= INPUT ======= -->
        <div class="input-area">
            <div class="input-row">
                <textarea id="user-input" placeholder="Ask me anything..." rows="1"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">➤</button>
            </div>
            <div class="input-hint">Press <b>Enter</b> to send · <b>Shift + Enter</b> for new line</div>
        </div>
    </div>

    <script>
        // 🔑 Your API Key
        const OPENROUTER_API_KEY = "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";

        const chatBox = document.getElementById("chat-box");
        const inputField = document.getElementById("user-input");
        const sendBtnEl = document.getElementById("send-btn");
        let conversationHistory = [
            { role: "system", content: "You are a helpful and friendly AI assistant named NexusAI. You give clear, concise, and well-formatted answers. Use markdown when helpful." }
        ];

        // ============ FORMAT AI TEXT ============
        function formatAIText(raw) {
            let text = raw;

            // Code blocks: ```lang\ncode\n``` → <pre><code>
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                return `<pre><code>${escapeHTML(code.trim())}</code></pre>`;
            });

            // Inline code
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Bold
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // Italic
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Line breaks
            text = text.replace(/\n/g, '<br>');

            return text;
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function getTimeString() {
            return new Date().toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        // ============ ADD MESSAGE BUBBLE ============
        function addMessage(role, html) {
            // Hide welcome card on first message
            const welcome = document.getElementById("welcome");
            if (welcome) welcome.style.display = "none";

            const time = getTimeString();
            const wrapper = document.createElement("div");

            if (role === "user") {
                wrapper.className = "msg user";
                wrapper.innerHTML = `
                <div class="msg-icon">👤</div>
                <div class="bubble">
                    ${html}
                    <span class="timestamp">${time}</span>
                </div>`;
            } else if (role === "ai") {
                wrapper.className = "msg ai";
                wrapper.innerHTML = `
                <div class="msg-icon">🧠</div>
                <div class="bubble">
                    ${html}
                    <span class="timestamp">${time}</span>
                </div>`;
            } else if (role === "error") {
                wrapper.className = "msg ai msg-error";
                wrapper.innerHTML = `
                <div class="msg-icon">⚠️</div>
                <div class="bubble">
                    <strong>Error:</strong> ${html}
                    <span class="timestamp">${time}</span>
                </div>`;
            }

            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ============ TYPING INDICATOR ============
        function showTyping() {
            const el = document.createElement("div");
            el.className = "typing-row";
            el.id = "typing-indicator";
            el.innerHTML = `
            <div class="msg-icon" style="width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--recv-bg);border:1px solid var(--border);">🧠</div>
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>`;
            chatBox.appendChild(el);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById("typing-indicator");
            if (el) el.remove();
        }

        // ============ SEND MESSAGE ============
        async function sendMessage() {
            const userMessage = inputField.value.trim();
            if (!userMessage) return;

            // Show user bubble
            addMessage("user", escapeHTML(userMessage));
            inputField.value = "";
            inputField.style.height = "auto";
            sendBtnEl.disabled = true;

            // Remember conversation
            conversationHistory.push({ role: "user", content: userMessage });

            // Typing indicator
            showTyping();

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "openrouter/free",
                        messages: conversationHistory
                    })
                });

                const data = await response.json();
                hideTyping();

                if (data.error) {
                    addMessage("error", data.error.message);
                } else if (data.choices && data.choices.length > 0) {
                    const aiText = data.choices[0].message.content;
                    conversationHistory.push({ role: "assistant", content: aiText });
                    addMessage("ai", formatAIText(aiText));
                } else {
                    addMessage("error", "Received an empty response from AI.");
                }

            } catch (error) {
                hideTyping();
                addMessage("error", error.message);
                console.error("Full error:", error);
            }

            sendBtnEl.disabled = false;
            inputField.focus();
        }

        // ============ QUICK PROMPTS ============
        function quickSend(text) {
            inputField.value = text;
            sendMessage();
        }

        // ============ CLEAR CHAT ============
        function clearChat() {
            chatBox.innerHTML = `
            <div class="welcome-card" id="welcome">
                <div class="welcome-icon">✨</div>
                <h2>Hey there! I'm NexusAI</h2>
                <p>Ask me anything — from coding questions to creative writing. I'm here to help!</p>
                <div class="quick-prompts">
                    <button class="quick-prompt" onclick="quickSend('Explain quantum computing simply')">🔬 Quantum Computing</button>
                    <button class="quick-prompt" onclick="quickSend('Write a short poem about the stars')">🌟 Write a Poem</button>
                    <button class="quick-prompt" onclick="quickSend('Give me 5 productivity tips')">💡 Productivity Tips</button>
                    <button class="quick-prompt" onclick="quickSend('Help me debug my JavaScript code')">🐛 Debug Code</button>
                </div>
            </div>`;
            conversationHistory = [
                { role: "system", content: "You are a helpful and friendly AI assistant named NexusAI. You give clear, concise, and well-formatted answers. Use markdown when helpful." }
            ];
        }

        // ============ INPUT HANDLERS ============
        inputField.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-grow textarea
        inputField.addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });
    </script>

</body>

</html>
