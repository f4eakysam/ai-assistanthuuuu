<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogla AI — Your Smart Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===================== RESET ===================== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-main: #0d0d0d;
            --bg-sidebar: #141414;
            --bg-chat: #0d0d0d;
            --bg-input: #1e1e1e;
            --bg-hover: #1a1a1a;
            --bg-msg-ai: #0d0d0d;
            --accent: #1a1a1a;
            --accent-dim: rgba(139, 124, 247, 0.15);
            --text: #e8e8e8;
            --text-secondary: #999;
            --text-muted: #666;
            --border: #2a2a2a;
            --border-light: #333;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-main);
            color: var(--text);
        }

        /* ===================== LAYOUT ===================== */
        .layout {
            display: flex;
            height: 100vh;
        }

        /* ===================== SIDEBAR ===================== */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .sidebar-top {
            padding: 14px;
        }

        .new-chat-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 13.5px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .new-chat-btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-light);
        }

        .new-chat-btn svg {
            flex-shrink: 0;
        }

        .sidebar-history {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 14px;
        }

        .sidebar-history::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-history::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .history-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 16px 8px 8px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .history-item.active {
            background: var(--bg-hover);
            color: var(--text);
        }

        .sidebar-bottom {
            padding: 12px 14px;
            border-top: 1px solid var(--border);
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            transition: background 0.2s ease;
            cursor: pointer;
        }

        .sidebar-user:hover {
            background: var(--bg-hover);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-name {
            font-size: 13px;
            font-weight: 500;
        }

        /* ===================== MAIN CHAT ===================== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* Top bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-main);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-btn {
            display: none;
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .menu-btn:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .model-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .topbar-right {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        /* ===================== MESSAGES ===================== */
        .messages {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 10px;
        }

        .msg-row {
            padding: 20px 0;
            animation: fadeSlide 0.35s ease;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-row.ai {
            background: var(--bg-msg-ai);
        }

        .msg-inner {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 16px;
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }

        .msg-row.user .msg-avatar {
            background: var(--accent);
        }

        .msg-row.ai .msg-avatar {
            background: #1a1a1a;
            border: 1px solid var(--border);
        }

        .msg-content {
            flex: 1;
            min-width: 0;
        }

        .msg-sender {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .msg-text {
            font-size: 14.5px;
            line-height: 1.7;
            color: var(--text);
            word-break: break-word;
        }

        .msg-text strong {
            font-weight: 600;
        }

        .msg-text code {
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        }

        .msg-text pre {
            background: #111;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 12px 0;
            overflow: hidden;
        }

        .pre-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            background: #1a1a1a;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }

        .copy-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            color: var(--text);
            background: #2a2a2a;
        }

        .msg-text pre code {
            display: block;
            padding: 14px;
            background: none;
            overflow-x: auto;
            line-height: 1.55;
        }

        .msg-actions {
            display: flex;
            gap: 2px;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .msg-row:hover .msg-actions {
            opacity: 1;
        }

        .action-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        /* Error styling */
        .msg-error .msg-text {
            color: #f87171;
        }

        /* ===================== WELCOME ===================== */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            animation: fadeSlide 0.5s ease;
        }

        .welcome-logo {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 32px;
            color: var(--text);
        }

        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 600px;
            width: 100%;
        }

        .prompt-card {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-family: inherit;
            line-height: 1.5;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .prompt-card:hover {
            background: var(--bg-hover);
            border-color: var(--border-light);
            color: var(--text);
        }

        .prompt-card-title {
            font-weight: 500;
            color: var(--text);
            margin-bottom: 2px;
        }

        /* ===================== TYPING ===================== */
        .typing-row {
            animation: fadeSlide 0.3s ease;
        }

        .typing-dots {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: dotBounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.16s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.32s;
        }

        @keyframes dotBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }

            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* ===================== INPUT ===================== */
        .input-area {
            padding: 0 24px 24px;
            background: var(--bg-main);
        }

        .input-container {
            max-width: 720px;
            margin: 0 auto;
        }

        .input-box {
            display: flex;
            align-items: flex-end;
            gap: 0;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 12px 8px 18px;
            transition: all 0.25s ease;
        }

        .input-box:focus-within {
            border-color: #444;
            box-shadow: 0 0 0 1px #444;
        }

        #user-input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 24px;
            max-height: 200px;
            line-height: 1.5;
            padding: 6px 0;
        }

        #user-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: var(--text);
            color: var(--bg-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            opacity: 0.85;
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        .send-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .input-disclaimer {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 10px;
        }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                z-index: 99;
            }

            .sidebar-overlay.open {
                display: block;
            }

            .menu-btn {
                display: flex;
            }

            .prompt-grid {
                grid-template-columns: 1fr;
            }

            .msg-inner {
                padding: 0 16px;
            }

            .input-area {
                padding: 0 12px 16px;
            }
        }

        @media (max-width: 480px) {
            .welcome h2 {
                font-size: 18px;
            }

            .prompt-card {
                font-size: 12px;
                padding: 12px;
            }

            .msg-text {
                font-size: 14px;
            }

            #user-input {
                font-size: 14px;
            }
        }

        /* ===================== SELECTION ===================== */
        ::selection {
            background: var(--accent);
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="layout">
        <!-- Overlay for mobile sidebar -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- ======= SIDEBAR ======= -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <button class="new-chat-btn" onclick="clearChat()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">

                    </svg>

        <!-- ======= MAIN ======= -->
        <div class="main">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="menu-btn" onclick="toggleSidebar()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12" />

                            <path d="M12 20h9" />

                        </svg>
                    </button>
                </div>
            </div>

            <!-- Messages / Welcome -->
            <div class="messages" id="chatArea">
                <div class="welcome" id="welcome">
                    <div class="welcome-logo">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text)"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                        </svg>
                    </div>
                    <h2>How can I help you today?</h2>
                    <div class="prompt-grid">
                        <button class="prompt-card" onclick="quickSend('Explain quantum computing in simple terms')">
                            <div class="prompt-card-title">Explain quantum computing</div>
                            in simple terms

                        <button class="prompt-card" onclick="quickSend('Write a short poem about the night sky')">
                            <div class="prompt-card-title">Write a poem</div>
                            about the night sky
                        </button>
                        <button class="prompt-card" onclick="quickSend('Give me 5 tips to be more productive')">
                            <div class="prompt-card-title">Productivity tips</div>
                            give me 5 useful tips
                        </button>
                        <button class="prompt-card" onclick="quickSend('Help me debug my JavaScript code')">
                            <div class="prompt-card-title">Debug my code</div>
                            help with JavaScript
                        </button>

                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <div class="input-box">
                        <textarea id="user-input" placeholder="Message DoglaAI..." rows="1"></textarea>
                        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />

    <script>
        // ===================== CONFIG =====================
        const OPENROUTER_API_KEY = "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";

        const chatArea = document.getElementById("chatArea");
        const inputField = document.getElementById("user-input");
        const sendBtnEl = document.getElementById("send-btn");
        const welcomeEl = document.getElementById("welcome");
        const sidebar = document.getElementById("sidebar");
        const sidebarOverlay = document.getElementById("sidebarOverlay");

        let conversationHistory = [
            { role: "system", content: "You are a helpful and friendly AI assistant named DoglaAI. You give clear, concise, and well-formatted answers. Use markdown formatting when helpful." }
        ];

        let isWelcomeVisible = true;

        // ===================== SIDEBAR =====================
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('open');
        }

        // ===================== FORMAT =====================
        function formatAIText(raw) {
            let text = raw;

            // Code blocks with copy button
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                const id = 'code-' + Math.random().toString(36).substr(2, 9);
                return `<pre><div class="pre-header"><span>${lang || 'code'}</span><button class="copy-btn" onclick="copyCode('${id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy</button></div><code id="${id}">${escapeHTML(code.trim())}</code></pre>`;
            });

            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function escapeHTML(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function copyCode(id) {
            const el = document.getElementById(id);
            if (el) {
                navigator.clipboard.writeText(el.textContent);
            }
        }

        // ===================== ADD MESSAGE =====================
        function addMessage(role, html) {
            if (isWelcomeVisible) {
                welcomeEl.remove();
                isWelcomeVisible = false;
            }

            const row = document.createElement("div");

            if (role === "user") {
                row.className = "msg-row user";
                row.innerHTML = `<div class="msg-inner">
                <div class="msg-avatar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                <div class="msg-content">
                    <div class="msg-sender">You</div>
                    <div class="msg-text">${html}</div>
                </div>
            </div>`;
            } else if (role === "ai") {
                row.className = "msg-row ai";
                row.innerHTML = `<div class="msg-inner">
                <div class="msg-avatar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></div>
                <div class="msg-content">
                    <div class="msg-sender">DoglaAI</div>
                    <div class="msg-text">${html}</div>
                    <div class="msg-actions">
                        <button class="action-btn" title="Copy" onclick="copyResponse(this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
                        <button class="action-btn" title="Like"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg></button>
                        <button class="action-btn" title="Dislike"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg></button>
                    </div>
                </div>
            </div>`;
            } else if (role === "error") {
                row.className = "msg-row ai msg-error";
                row.innerHTML = `<div class="msg-inner">
                <div class="msg-avatar" style="border-color:#f87171;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
                <div class="msg-content">
                    <div class="msg-sender" style="color:#f87171;">Error</div>
                    <div class="msg-text">${html}</div>
                </div>
            </div>`;
            }

            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function copyResponse(btn) {
            const text = btn.closest('.msg-content').querySelector('.msg-text').textContent;
            navigator.clipboard.writeText(text);
        }

        // ===================== TYPING =====================
        function showTyping() {
            const row = document.createElement("div");
            row.className = "msg-row ai typing-row";
            row.id = "typing-indicator";
            row.innerHTML = `<div class="msg-inner">
            <div class="msg-avatar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></div>
            <div class="msg-content">
                <div class="msg-sender">DoglaAI</div>
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>
        </div>`;
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById("typing-indicator");
            if (el) el.remove();
        }

        // ===================== SEND =====================
        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            addMessage("user", escapeHTML(text));
            inputField.value = "";
            inputField.style.height = "auto";
            sendBtnEl.disabled = true;

            conversationHistory.push({ role: "user", content: text });
            showTyping();

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href,
                        "X-Title": "DoglaAI Assistant"
                    },
                    body: JSON.stringify({
                        model: "openrouter/free",
                        messages: conversationHistory
                    })
                });

                const data = await res.json();
                hideTyping();

                if (data.error) {
                    addMessage("error", data.error.message);
                } else if (data.choices && data.choices.length > 0) {
                    const aiText = data.choices[0].message.content;
                    conversationHistory.push({ role: "assistant", content: aiText });
                    addMessage("ai", formatAIText(aiText));
                    updateSidebarHistory(text);
                } else {
                    addMessage("error", "Received an empty response.");
                }
            } catch (err) {
                hideTyping();
                addMessage("error", err.message);
            }

            sendBtnEl.disabled = false;
            inputField.focus();
        }

        // ===================== SIDEBAR HISTORY =====================
        function updateSidebarHistory(userMsg) {
            const short = userMsg.length > 28 ? userMsg.slice(0, 28) + '...' : userMsg;
            const historyEl = document.getElementById("sidebarHistory");
            const firstItem = historyEl.querySelector('.history-item');
            if (firstItem && firstItem.classList.contains('active')) {
                firstItem.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ${escapeHTML(short)}`;
            }
        }

        // ===================== QUICK SEND =====================
        function quickSend(text) {
            inputField.value = text;
            sendMessage();
        }

        // ===================== CLEAR =====================
        function clearChat() {
            chatArea.innerHTML = `<div class="welcome" id="welcome">
            <div class="welcome-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </div>
            <h2>How can I help you today?</h2>
            <div class="prompt-grid">
                <button class="prompt-card" onclick="quickSend('Explain quantum computing in simple terms')"><div class="prompt-card-title">Explain quantum computing</div>in simple terms</button>
                <button class="prompt-card" onclick="quickSend('Write a short poem about the night sky')"><div class="prompt-card-title">Write a poem</div>about the night sky</button>
                <button class="prompt-card" onclick="quickSend('Give me 5 tips to be more productive')"><div class="prompt-card-title">Productivity tips</div>give me 5 useful tips</button>
                <button class="prompt-card" onclick="quickSend('Help me debug my JavaScript code')"><div class="prompt-card-title">Debug my code</div>help with JavaScript</button>
            </div>
        </div>`;

            isWelcomeVisible = true;
            conversationHistory = [
                { role: "system", content: "You are a helpful and friendly AI assistant named DoglaAI. You give clear, concise, and well-formatted answers. Use markdown formatting when helpful." }
            ];

            // Update sidebar
            const historyEl = document.getElementById("sidebarHistory");
            historyEl.innerHTML = `<div class="history-label">Today</div>
            <div class="history-item active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> New conversation</div>`;

            // Close mobile sidebar
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
        }

        // ===================== INPUT =====================
        inputField.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        inputField.addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 200) + "px";
        });
    </script>

</body>

</html>
